name: Copilot Setup Steps
on:
  workflow_dispatch:
  push:
    paths: [.github/workflows/copilot-setup-steps.yml]
  pull_request:
    paths: [.github/workflows/copilot-setup-steps.yml]

jobs:
  # Job name MUST be exactly this or Copilot will ignore it
  copilot-setup-steps:
    # Stuck on Ubuntu per Copilot limitations
    runs-on: macos-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Example: Node/PNPM project setup — customize for your stack
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
