# Paralegal AI Configuration

env: development
region: us-east-1

# Database
database:
  url: postgresql://paralegal:paralegal@postgres:5432/paralegal

# Object Storage
object_store:
  endpoint: http://minio:9000
  bucket: paralegal
  access_key: paralegal
  secret_key: paralegal123

# Email Ingestion
mail:
  provider: mock  # outlook|gmail|imap|mock
  outlook:
    tenant_id: ${AZURE_TENANT_ID}
    client_id: ${AZURE_CLIENT_ID} 
    client_secret: ${AZURE_CLIENT_SECRET}
    subscription_mode: webhooks
    allowed_mailboxes: 
      - "inbox@firm.com"
      - "deals@firm.com"
  gmail:
    project_id: ${GCP_PROJECT_ID}
    service_account_json: ${GCP_SA_JSON_B64}
    watch_label: INBOX
  imap:
    host: imap.example.com
    port: 993
    username: ${IMAP_USER}
    password: ${IMAP_PASS}

# LLM Configuration
llm:
  private:
    base_url: http://private-llm:8000/v1
    model: "meta-llama/llama-3.1-70b-instruct"
    no_egress: true  # NEVER change to false in production
  connected:
    enabled: false  # Set to true only if external fact-checking needed
    provider: azure-openai  # azure-openai|openai|anthropic
    base_url: ${AZURE_OPENAI_URL}
    api_key: ${AZURE_OPENAI_KEY}

# Bridge Service (Privacy Controls)
bridge:
  enable_connected_box: false  # Must match llm.connected.enabled
  max_query_chars: 512
  allowlist_templates:
    - CPLR_STANDARD
    - UK_CASE_CITATION_LOOKUP 
    - CFR_SECTION_SUMMARY

# Redaction Rules
redaction:
  patterns:
    - type: EMAIL
      enabled: true
    - type: NAME
      enabled: true
    - type: AMOUNT
      enabled: true
    - type: DATE
      enabled: true
    - type: DOMAIN
      enabled: true

# Whitelist (Future Enhancement)
whitelist:
  domains: 
    - "courtlistener.com"
    - "law.cornell.edu"
  contacts: 
    - "co-counsel@allyfirm.com"
  ttl_active_conversation_hours: 72

# Data Retention
retention:
  summaries_days: 30
  logs_days: 365
  original_emails: "follow_firm_policy"  # Not changed by Paralegal AI

# Security
security:
  audit_chain_enabled: true
  merkle_checkpoints: daily
  encryption_at_rest: "AES-256-GCM"
  tls_version: "1.3"

# Development/Debug
debug:
  enabled: true  # Set to false in production
  verbose_logging: true
  mock_responses: true  # For LLM fallbacks